<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wyniki Ankiety - LookUp Sky Events</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#e8e4df;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:40px 24px}
.header{text-align:center;margin-bottom:48px;padding-bottom:32px;border-bottom:1px solid rgba(255,255,255,0.08)}
.header .logo{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#a09080;margin-bottom:16px}
.header h1{font-size:28px;font-weight:300;letter-spacing:-0.5px;color:#fff;margin-bottom:8px}
.header .subtitle{font-size:14px;color:#7a7570}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:48px}
.stat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:24px;text-align:center}
.stat-card .number{font-size:36px;font-weight:300;color:#c9a96e;margin-bottom:4px}
.stat-card .label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#6a6560}
.chart-section{margin-bottom:48px}
.chart-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#c9a96e;margin-bottom:20px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.06)}
.chart-block{margin-bottom:32px}
.chart-block h3{font-size:14px;font-weight:400;color:#e8e4df;margin-bottom:12px}
.bar-row{display:flex;align-items:center;margin-bottom:8px}
.bar-label{width:200px;font-size:13px;color:#a09590;flex-shrink:0;text-align:right;padding-right:16px}
.bar-track{flex:1;height:28px;background:rgba(255,255,255,0.03);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;background:linear-gradient(90deg,#c9a96e,#e8d5b0);border-radius:4px;display:flex;align-items:center;padding-left:10px;font-size:12px;font-weight:600;color:#0a0a0a;min-width:fit-content;transition:width 0.6s cubic-bezier(.4,0,.2,1)}
.bar-fill.empty{background:transparent;color:#5a5550;font-weight:400}
.bar-count{margin-left:8px;font-size:11px;color:#7a7570;font-weight:400}
.no-data{text-align:center;padding:80px 20px;color:#4a4540}
.no-data h2{font-size:20px;font-weight:300;margin-bottom:8px}
.btn-reset{background:transparent;border:1px solid rgba(255,80,80,0.3);color:rgba(255,80,80,0.7);padding:10px 24px;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;margin-top:24px}
.btn-reset:hover{border-color:rgba(255,80,80,0.6);color:rgba(255,80,80,1)}
@media(max-width:600px){.stats-grid{grid-template-columns:1fr}.bar-label{width:120px;font-size:11px}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">LookUp Sky Events</div>
    <h1>Wyniki Ankiety</h1>
    <div class="subtitle">Dashboard z wynikami badania percepcji</div>
  </div>
  <div id="content"></div>
</div>
<script>
const BIN_ID = "6a3d8235f5f4af5e2930b8d0";
const API_KEY = "$2a$10$PizBTmh376ENFLNZCH5ol.lc7xyIhqPjU0z5IbNQ8dGvLI1YC5rda";
const el = document.getElementById('content');

el.innerHTML = '<div style="text-align:center;padding:50px;color:#c9a96e;">Synchronizacja danych z serwerem...</div>';

fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
  headers: { 'X-Master-Key': API_KEY }
})
.then(res => res.json())
.then(json => {
  const serverData = (json.record && json.record.responses) ? json.record.responses : [];
  const localData = JSON.parse(localStorage.getItem('lookup_survey_results') || '[]');
  
  // Łączenie danych lokalnych i z serwera (usuwanie duplikatów po dacie)
  const allData = [...serverData, ...localData];
  const uniqueDataMap = new Map();
  allData.forEach(item => uniqueDataMap.set(item.timestamp, item));
  const DATA = Array.from(uniqueDataMap.values());
  
  // Zapisz połączone z powrotem lokalnie
  localStorage.setItem('lookup_survey_results', JSON.stringify(DATA));
  
  renderDashboard(DATA);
})
.catch(err => {
  console.error("Błąd pobierania bazy danych:", err);
  const DATA = JSON.parse(localStorage.getItem('lookup_survey_results') || '[]');
  renderDashboard(DATA);
});

function loadDemoData() {
  const mockResponses = [];
  const options = {
    q1: ["Właściciel / Wspólnik / Zarząd", "Dyrektor / Kierownik działu", "Dyrektor kreatywny", "Project / Account Manager", "Event Manager / Specjalista", "Inne"],
    q2: ["1-5", "6-20", "21-50", "50+"],
    q3: ["<10", "10-30", "31-60", "60+"],
    q4: ["Konferencje, kongresy i seminaria", "Gale wieczorne i rozdania nagród", "Premiery produktów", "Śniadania biznesowe", "Mini konferencje", "Spotkania integracyjne dla firm", "Targi i wystawy"],
    q5: ["Tak, dobrze znam", "Tak, słyszałem, ale nie znam szczegółów", "Nie, nie słyszałem"],
    q6: ["Z polecenia klienta", "Z polecenia kolegów z branży", "Z mediów społecznościowych", "Z kampanii w internecie", "Ze strony internetowej", "Od klienta, który sam zaproponował", "Inne"],
    q7: ["Tak, wielokrotnie", "Tak, raz lub dwa razy", "Nie, ale rozważałem", "Nie i nie rozważałem"],
    q8: ["Spektakularny widok na panoramę Warszawy", "Prestiżowe miejsce", "Nowoczesny, elegancki design wnętrz", "Elastyczność przestrzeni", "Własna kuchnia i catering Villa Foksal", "Profesjonalna obsługa", "Dobra lokalizacja", "Nagrody i wyróżnienia", "Dział sprzedaży"],
    q9: ["Nieco niższa", "Porównywalne", "Nieco droższa", "Znacznie droższa", "Nie mam porównania"],
    q10: ["Wyjątkowe smaki i wrażenia kulinarne", "Bardzo dobra", "Dobra", "Średnia", "Niska", "Wysoka cena, względem konkurencji", "Wysoka cena względem jakości"],
    q11: ["Bardzo elastyczna", "Elastyczna", "Średnia", "Mało elastyczna", "Nie wiem", "Duży minus za brak własnego cateringu"],
    q12: ["Bardzo dobrze", "Dobrze", "Średnio", "Słabo", "Nie mam doświadczenia"],
    q13: ["Tak, zawsze", "Czasem tak, czasem szablonowe", "Często szablonowe", "Nie otrzymywałem ofert"],
    q14: ["Gdy klient szuka prestiżowej lokalizacji z widokiem", "Gdy klient chce zrobić wrażenie na gościach", "Gdy organizowany jest event biznesowy / korporacyjny", "Gdy potrzebne jest miejsce na konferencję lub prezentację", "Gdy klient chce elegancką kolację lub bankiet", "Gdy klient szuka czegoś unikalnego, innego niż hotel", "Gdy budżet klienta pozwala na premium lokalizację"],
    q15: ["Gdy klient ma ograniczony budżet", "Gdy klient chce miejsce z dużym parkingiem blisko sali", "Gdy klient preferuje hotel z możliwością noclegu", "Gdy klient chce miejsce z ogrodem / przestrzenią plenerową", "Gdy klient już był w Lookup i nie chce powtarzać lokalizacji", "Gdy mam lepsze alternatywy w podobnej cenie", "Zawsze rekomenduję/em"],
    q16: ["Często (>50%)", "Czasem (20-50%)", "Rzadko (<20%)", "Bardzo rzadko / nigdy"],
    q17: ["Wszystkie lub prawie wszystkie", "Większość (>50%)", "Ok. połowę", "Mniej niż połowę", "Żadne"],
    q18: ["Niższe ceny", "Większa elastyczność cenowa + stałe dobre rabaty dla agencji", "Lepsza komunikacja z działem sprzedaży", "Szybsze przygotowanie ofert", "Większa powierzchnia / więcej sal", "Lepsza dostępność terminów", "Lepsze materiały do prezentacji klientom", "Możliwość organizacji eventu próbnego / pokazowego", "Inne"],
    q19: ["Varso 46", "Skyfall Warsaw", "Sky Hall", "Hotele", "Pałac Kultury", "Level 27"],
    q20: ["Hotel z dużą salą konferencyjną", "Przestrzeń industrialna", "Inny wieżowiec z event space", "Restauracja z salą eventową", "Kamienica / zabytkowy budynek", "Miejsce z przestrzenią na zewnątrz", "Nie wiem"],
    q21: ["Tak, klienci nie chcą wracać", "Nie - miejsce się sprawdza", "Nie mam zdania"],
    q22: ["Wysoka cena", "Ograniczona powierzchnia", "Brak możliwości noclegu", "Ograniczona dostępność parkingowa", "Catering, tylko własny", "Dział sprzedaży - brak elastyczności", "Klienci nie znają tego miejsca", "Brak materiałów marketingowych do prezentacji klientom"],
    q23: [
      "Widok z okien na 42. piętrze robi ogromne wrażenie na gościach.",
      "Prestiżowa lokalizacja w Skyliner i świetny catering Villa Foksal.",
      "Klientom zależy na efekcie WOW, a panorama Warszawy to gwarantuje.",
      "Design oraz wysoki standard wykończenia sal.",
      "Bardzo dobra obsługa ze strony opiekuna projektu.",
      "Unikalność miejsca, to nie jest kolejny standardowy hotel."
    ]
  };

  const selectRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const selectMultiple = (arr, max = 3) => {
    const shuffled = [...arr].sort(() => 0.5 - Math.random());
    const count = Math.floor(Math.random() * max) + 1;
    return shuffled.slice(0, count).join("; ");
  };

  for (let i = 0; i < 28; i++) {
    const ans = {};
    ans.q1 = selectRandom(options.q1);
    ans.q2 = selectRandom(options.q2);
    ans.q3 = selectRandom(options.q3);
    ans.q4 = selectMultiple(options.q4, 3);
    
    const knows = Math.random() > 0.15 ? selectRandom(options.q5.slice(0, 2)) : "Nie, nie słyszałem";
    ans.q5 = knows;

    if (knows !== "Nie, nie słyszałem") {
      ans.q6 = selectMultiple(options.q6, 2);
      ans.q7 = selectRandom(options.q7);
      ans.q8 = selectMultiple(options.q8, 4);
      ans.q9 = selectRandom(options.q9);
      ans.q10 = selectRandom(options.q10);
      ans.q11 = selectRandom(options.q11);
      ans.q12 = selectRandom(options.q12);
      ans.q13 = selectRandom(options.q13);
      ans.q14 = selectMultiple(options.q14, 3);
      ans.q15 = selectMultiple(options.q15, 3);
      ans.q16 = selectRandom(options.q16);
      ans.q17 = selectRandom(options.q17);
      ans.q18 = selectMultiple(options.q18, 3);
      ans.q19 = selectMultiple(options.q19, 3);
      ans.q20 = selectRandom(options.q20);
      ans.q21 = selectRandom(options.q21);
      ans.q22 = selectMultiple(options.q22, 2);
      if (Math.random() > 0.4) {
        ans.q23 = selectRandom(options.q23);
      }
    }

    mockResponses.push({
      timestamp: new Date(Date.now() - Math.random() * 10 * 24 * 60 * 60 * 1000).toISOString(),
      answers: ans
    });
  }

  localStorage.setItem('lookup_survey_results', JSON.stringify(mockResponses));
  location.reload();
}

function renderDashboard(DATA) {
  if (!DATA.length) {
    el.innerHTML = `
      <div class="no-data">
        <h2>Brak danych</h2>
        <p>Ankieta nie została jeszcze wypełniona ani razu.</p>
        <p style="margin-top:16px; margin-bottom: 24px;">
          <a href="index.html" style="color:#c9a96e; text-decoration:none; border:1px solid #c9a96e; padding:8px 16px; border-radius:4px; font-size:13px; display:inline-block;">Przejdź do ankiety</a>
        </p>
        <div style="margin-top: 32px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 32px;">
          <p style="color: #8a8580; font-size: 13px; margin-bottom: 16px; line-height: 1.5;">Chcesz przetestować wygląd dashboardu z wygenerowanymi automatycznie wynikami?</p>
          <button id="btn-load-demo" style="background:#c9a96e; border:none; color:#0a0a0a; padding:12px 24px; border-radius:6px; font-weight:600; cursor:pointer; font-size:12px; font-family:inherit; transition:opacity 0.2s;">Załaduj dane demonstracyjne</button>
        </div>
      </div>
    `;
    document.getElementById('btn-load-demo').addEventListener('click', loadDemoData);
} else {
  const total = DATA.length;
  const answers = DATA.map(d => d.answers);

  function count(q) {
    const c = {};
    answers.forEach(a => {
      if (a[q]) {
        const vals = a[q].split('; ');
        vals.forEach(v => { c[v] = (c[v] || 0) + 1; });
      }
    });
    return Object.entries(c).sort((a,b) => b[1] - a[1]);
  }

  function barHTML(label, count, max) {
    const pct = max ? Math.round((count / max) * 100) : 0;
    return `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill${pct===0?' empty':''}" style="width:${Math.max(pct,2)}%">${pct > 8 ? pct+'%' : ''}</div></div><div class="bar-count">${count}</div></div>`;
  }

  function renderBars(q, title) {
    const data = count(q);
    const max = data.length ? data[0][1] : 0;
    if (!data.length) return '';
    return `<div class="chart-block"><h3>${title}</h3>${data.map(d => barHTML(d[0], d[1], max)).join('')}</div>`;
  }

  function renderYesNo(q, title) {
    const data = count(q);
    if (!data.length) return '';
    return `<div class="chart-block"><h3>${title}</h3>${data.map(d => barHTML(d[0], d[1], total)).join('')}</div>`;
  }

  let html = `
    <div class="stats-grid">
      <div class="stat-card"><div class="number">${total}</div><div class="label">Wypełnionych ankiet</div></div>
      <div class="stat-card"><div class="number">${new Set(answers.map(a => a.q1)).size}</div><div class="label">Różnych stanowisk</div></div>
      <div class="stat-card"><div class="number">${answers.filter(a => a.q7 && a.q7.startsWith('Tak')).length}</div><div class="label">Realizowało event w LookUp</div></div>
    </div>

    <div class="chart-section">
      <div class="chart-title">Część I &mdash; Profil respondenta</div>
      ${renderBars('q1', 'Stanowisko w organizacji')}
      ${renderBars('q2', 'Wielkość agencji')}
      ${renderBars('q3', 'Liczba eventów rocznie')}
      ${renderBars('q4', 'Rodzaje eventów')}
    </div>

    <div class="chart-section">
      <div class="chart-title">Część II &mdash; Znajomość marki LookUp</div>
      ${renderBars('q5', 'Czy znasz LookUp?')}
      ${renderBars('q6', 'Skąd informacje o LookUp?')}
      ${renderBars('q7', 'Czy realizowałeś(aś) event w LookUp?')}
    </div>

    <div class="chart-section">
      <div class="chart-title">Część III &mdash; Percepcja miejsca</div>
      ${renderBars('q8', 'Główne zalety LookUp')}
      ${renderBars('q9', 'Cena vs inne wieżowce')}
      ${renderBars('q10', 'Jakość cateringu Villa Foksal')}
      ${renderBars('q11', 'Elastyczność oferty cateringowej')}
    </div>

    <div class="chart-section">
      <div class="chart-title">Część IV &mdash; Obsługa i współpraca</div>
      ${renderBars('q12', 'Praca działu sprzedaży')}
      ${renderBars('q13', 'Dostosowanie ofert do klienta')}
    </div>

    <div class="chart-section">
      <div class="chart-title">Część V &mdash; Rekomendacje</div>
      ${renderBars('q14', 'Kiedy rekomendujesz LookUp?')}
      ${renderBars('q15', 'Kiedy NIE rekomendujesz LookUp?')}
      ${renderBars('q16', 'Jak często eventy nadają się do LookUp?')}
      ${renderBars('q17', 'Ile z nich trafia do LookUp?')}
      ${renderBars('q18', 'Co zwiększyłoby rekomendacje?')}
    </div>

    <div class="chart-section">
      <div class="chart-title">Część VI &mdash; Konkurencja i alternatywy</div>
      ${renderBars('q19', 'Znajomość innych lokalizacji w wieżowcach')}
      ${renderBars('q20', 'Najczęściej wybierany rodzaj przestrzeni')}
      ${renderBars('q21', 'Etyka niepowtarzania lokalizacji')}
    </div>

    <div class="chart-section">
      <div class="chart-title">Część VII &mdash; Podsumowanie</div>
      ${renderBars('q22', 'Największe bariery rekomendacji')}
    </div>

    <div class="chart-section">
      <div class="chart-title">Otwarte odpowiedzi</div>
      <div class="chart-block"><h3>Co decyduje o wyborze LookUp?</h3>
        ${answers.filter(a=>a.q23).map(a=>'<div style="padding:10px 16px;margin-bottom:6px;background:rgba(255,255,255,0.03);border-radius:6px;font-size:13px;color:#c8c3be;border-left:2px solid #c9a96e">'+a.q23+'</div>').join('') || '<div style="color:#4a4540;font-size:13px">Brak odpowiedzi</div>'}
      </div>
    </div>

    <div style="text-align:center;margin-top:40px;padding-bottom:40px;">
      <button class="btn-action" style="background:#2a2520;border:1px solid #c9a96e;color:#c9a96e;padding:10px 24px;border-radius:6px;cursor:pointer;margin:0 10px;" onclick="exportData()">Eksportuj dane (z tego urządzenia)</button>
      <button class="btn-action" style="background:#2a2520;border:1px solid #c9a96e;color:#c9a96e;padding:10px 24px;border-radius:6px;cursor:pointer;margin:0 10px;" onclick="importData()">Importuj dane</button>
      <button class="btn-reset" onclick="if(confirm('Na pewno usunąć wszystkie dane?')){localStorage.removeItem('lookup_survey_results');location.reload();}">Wyczyść dane</button>
    </div>
  `;
  el.innerHTML = html;
}

// Funkcje eksportu i importu
window.exportData = function() {
  const data = localStorage.getItem('lookup_survey_results');
  if (!data || data === '[]') {
    alert("Brak danych do wyeksportowania na tym urządzeniu.");
    return;
  }
  
  // Próba zapisania jako plik
  const blob = new Blob([data], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = "ankieta_wyniki.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  // Dodatkowo kopiujemy do schowka dla wygody na komórkach
  navigator.clipboard.writeText(data).then(() => {
    alert("Dane zostały pobrane jako plik oraz skopiowane do schowka! Możesz je teraz wkleić na innym urządzeniu.");
  }).catch(err => {
    alert("Dane zostały pobrane jako plik.");
  });
};

window.importData = function() {
  const input = prompt("Wklej skopiowane dane (tekst JSON) z innego urządzenia:");
  if (input && input.trim().length > 0) {
    try {
      const parsed = JSON.parse(input);
      if (Array.isArray(parsed)) {
        // Dodaj do istniejących
        const existing = JSON.parse(localStorage.getItem('lookup_survey_results') || '[]');
        const merged = existing.concat(parsed);
        // Usuwanie duplikatów
        const uniqueDataMap = new Map();
        merged.forEach(item => uniqueDataMap.set(item.timestamp, item));
        const finalMerged = Array.from(uniqueDataMap.values());
        
        localStorage.setItem('lookup_survey_results', JSON.stringify(finalMerged));

        const BIN_ID = "6a3d8235f5f4af5e2930b8d0";
        const API_KEY = "$2a$10$PizBTmh376ENFLNZCH5ol.lc7xyIhqPjU0z5IbNQ8dGvLI1YC5rda";
        
        fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method: "PUT",
          headers: {
            'X-Master-Key': API_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ responses: finalMerged })
        }).then(() => {
          alert("Pomyślnie zaimportowano i zsynchronizowano dane!");
          location.reload();
        }).catch(() => {
          alert("Zapisano tylko lokalnie (błąd serwera).");
          location.reload();
        });
      } else {
        alert("Błędny format danych.");
      }
    } catch (e) {
      alert("To nie są poprawne dane ankiety (Błąd parsowania JSON).");
    }
  }
};

</script>
</body>
</html>
